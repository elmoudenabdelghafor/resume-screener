name: CI/CD Pipeline - dashboard-service

on:
  push:
    branches:
      - main
    paths:
      - 'services/dashboard-service/**'
  pull_request:
    paths:
      - 'services/dashboard-service/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: elmoudenabdelghafor/resumescreener-dashboard-service

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'services/dashboard-service/package-lock.json'

      - name: Install dependencies
        working-directory: services/dashboard-service
        run: npm ci

      - name: Lint
        working-directory: services/dashboard-service
        run: npm run lint

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./services/dashboard-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Update Helm Chart values.yaml
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          TAG_NAME="sha-${GITHUB_SHA::7}"
          sed -i 's/tag: .*/tag: "'$TAG_NAME'"/g' helm/dashboard-service/values.yaml

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: deploy dashboard-service to $TAG_NAME [skip ci]" || echo "No changes to commit"
          MAX_RETRIES=5
          RETRY_COUNT=0
          until git push origin main; do
            RETRY_COUNT=$((RETRY_COUNT+1))
            if [ $RETRY_COUNT -ge $MAX_RETRIES ]; then
              echo "Failed to push after $MAX_RETRIES attempts."
              exit 1
            fi
            echo "Push failed, retrying ($RETRY_COUNT/$MAX_RETRIES)..."
            sleep $((RANDOM % 5 + 2))
            git pull --rebase origin main
          done
