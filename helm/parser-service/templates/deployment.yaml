apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "parser-service.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "parser-service.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "parser-service.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "parser-service.name" . }}
    spec:
      containers:
        - name: parser-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8002
              protocol: TCP
          env:
{{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
{{- end }}

          resources:
            {{- toYaml .Values.resources | nindent 12 }}
