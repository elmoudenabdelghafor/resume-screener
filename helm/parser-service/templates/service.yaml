apiVersion: v1
kind: Service
metadata:
  name: parser-service
  labels:
    app.kubernetes.io/name: {{ include "parser-service.name" . }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "parser-service.name" . }}
