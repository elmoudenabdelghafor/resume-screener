apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-screener-service.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "ai-screener-service.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "ai-screener-service.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "ai-screener-service.name" . }}
    spec:
      containers:
        - name: ai-screener-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8003
              protocol: TCP
          env:
{{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
{{- end }}

            # Secret injections (populated via pre-existing K8s Secret or injected by ArgoCD)
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-secrets
                  key: groq-api-key
            - name: HF_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ai-secrets
                  key: hf-api-token
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
