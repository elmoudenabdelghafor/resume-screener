
services:
  # ── Object Storage ───────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Message / Job Queue ──────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Database ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-resume_screener}
      POSTGRES_USER: ${POSTGRES_USER:-screener}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-screener}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO bucket init (one-shot) ─────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
        mc mb --ignore-existing local/${MINIO_BUCKET:-resumes};
        mc anonymous set download local/${MINIO_BUCKET:-resumes};
        exit 0;
      "

  # ── Upload Service ───────────────────────────────────────
  upload-service:
    build:
      context: ./services/upload-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-resumes}
      MINIO_SECURE: "false"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-resume_screener}
      POSTGRES_USER: ${POSTGRES_USER:-screener}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  # ── Parser Service ───────────────────────────────────────
  parser-service:
    build:
      context: ./services/parser-service
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-resumes}
      MINIO_SECURE: "false"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-resume_screener}
      POSTGRES_USER: ${POSTGRES_USER:-screener}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ── AI Screener Service ──────────────────────────────────
  ai-screener-service:
    build:
      context: ./services/ai-screener-service
      dockerfile: Dockerfile
    ports:
      - "8003:8003"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-resume_screener}
      POSTGRES_USER: ${POSTGRES_USER:-screener}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      GROQ_API_KEY: ${GROQ_API_KEY}
      HF_API_TOKEN: ${HF_API_TOKEN}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ── Dashboard (React SPA) ────────────────────────────────
  dashboard-service:
    build:
      context: ./services/dashboard-service
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - ai-screener-service

volumes:
  minio_data:
  postgres_data:
